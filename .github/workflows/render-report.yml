# zzcollab render-report.yml v2.6.0
#
# Tier 3 (render) for all zzcollab research compendia.
# Builds the project Docker image, mounts TinyTeX from the host runner
# at /opt/tinytex (world-accessible and world-writable so TinyTeX can
# auto-install missing LaTeX packages at render time). Works for both
# rocker/tidyverse (non-root user) and rocker/verse (root user with
# built-in TinyTeX) base images.
# Path-filtered to run only when analysis code or environment changes.
#
name: Render Reports

on:
  push:
    branches: [ main, master ]
    paths:
      - 'analysis/**'
      - 'R/**'
      - 'renv.lock'
      - 'Dockerfile'
      - '.github/workflows/render-report.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'analysis/**'
      - 'R/**'
      - 'renv.lock'
      - 'Dockerfile'

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Install TinyTeX on host runner
        uses: r-lib/actions/setup-tinytex@v2

      - name: Make TinyTeX tree accessible and writable to container
        run: chmod -R a+rwx $HOME/.TinyTeX

      - name: Build Docker image
        run: |
          echo "Building computational environment..."
          docker build -t compendium-env .

      - name: Restore packages and render all manuscripts
        run: |
          docker run --rm -e CI=true \
            -v ${{ github.workspace }}:/project \
            -v $HOME/.TinyTeX:/opt/tinytex \
            -e PATH="/opt/tinytex/bin/x86_64-linux:$PATH" \
            -w /project compendium-env \
            Rscript -e '
              renv::restore()
              rmds <- list.files(
                "analysis", pattern = "^report[.]Rmd$",
                recursive = TRUE, full.names = TRUE
              )
              cat("Found", length(rmds), "manuscripts to render\n\n")
              failed <- character()
              for (rmd in rmds) {
                cat("=== Rendering:", rmd, "===\n")
                old_wd <- setwd(dirname(rmd))
                tryCatch(
                  rmarkdown::render(basename(rmd)),
                  error = function(e) {
                    cat("FAILED:", conditionMessage(e), "\n")
                    failed <<- c(failed, rmd)
                  }
                )
                setwd(old_wd)
              }
              cat("\n=== summary ===\n")
              cat("rendered:", length(rmds) - length(failed), "\n")
              cat("failed:  ", length(failed), "\n")
              if (length(failed) > 0) {
                for (f in failed) cat("  ", f, "\n")
                quit(status = 1)
              }
            '

      - name: Upload rendered PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manuscripts
          path: |
            analysis/**/*.pdf
          retention-days: 30
          if-no-files-found: warn
